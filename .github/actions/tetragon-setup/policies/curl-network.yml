apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: "curl-network"
spec:
  kprobes:
  - call: "tcp_connect"
    syscall: false
    args:
    - index: 0
      type: "sock"
    selectors:
    - matchBinaries:
      - operator: "Postfix"
        values:
        - "/curl"
      matchActions:
      - action: Sigkill
